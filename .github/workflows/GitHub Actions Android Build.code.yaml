name: Build Android APK
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Update URL in MainActivity
        run: |
          sed -i 's|private const val KVIDEO_URL = .*|private const val KVIDEO_URL = "https://kv.szqh.dpdns.org"|g' android-tv/app/src/main/java/com/kvideo/tv/MainActivity.kt
      - name: Build APK with Gradle
        run: |
          cd android-tv
          ls -al
          ./gradle assembleDebug
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android-tv/app/build/outputs/apk/debug/app-debug.apk
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android-tv/app/build/outputs/apk/debug/app-debug.apk

